<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Work Now, Play Now</title>
  <link rel="stylesheet" href="/styles/index.css">
  <link rel="icon" href="/favicon.ico">
</head>
<body>

  <header>
    <a href="/home" style="display:flex;align-items:center;gap:12px;text-decoration:none;">
      <img class="logo-img" src="/image/logo_512.png" alt="Work Now Play Now logo">
      <div class="logo-text">
        <span class="work">Work Now</span>, <span class="play">Play Now</span>
      </div>
    </a>
    <div class="flex-spacer"></div>
  </header>

  <main style="max-width:560px;margin:0 auto;padding:60px 24px;">
    <h1 style="margin-bottom:8px;">Get in Touch</h1>
    <p style="color:var(--text-muted);margin-bottom:48px;font-size:15px;line-height:1.7;">
      Have a question, found a bug, or just want to say hi? We'd love to hear from you.
    </p>

    <div style="display:flex;flex-direction:column;gap:20px;">

      <div style="
        background:var(--bg-card);
        border:1px solid var(--border);
        border-radius:var(--radius);
        padding:28px;
        display:flex;
        flex-direction:column;
        gap:16px;
      ">
        <div>
          <label style="font-size:13px;font-weight:600;color:var(--text-muted);display:block;margin-bottom:6px;">Your Name</label>
          <input type="text" id="contact-name" placeholder="John Doe">
        </div>
        <div>
          <label style="font-size:13px;font-weight:600;color:var(--text-muted);display:block;margin-bottom:6px;">Your Email</label>
          <input type="email" id="contact-email" placeholder="you@example.com">
        </div>
        <div>
          <label style="font-size:13px;font-weight:600;color:var(--text-muted);display:block;margin-bottom:6px;">Message</label>
          <textarea id="contact-message" placeholder="What's on your mind?" style="min-height:120px;"></textarea>
        </div>
        <button class="cta-button" style="align-self:flex-end;" onclick="sendMessage()">Send Message</button>
        <p id="contact-status" style="font-size:13px;color:var(--text-muted);display:none;"></p>
      </div>

      <div style="
        background:var(--bg-card);
        border:1px solid var(--border);
        border-radius:var(--radius);
        padding:24px;
        color:var(--text-muted);
        font-size:14px;
        line-height:1.7;
      ">
        Or reach us directly at
        <a href="mailto:contact@worknowplaynow.com" style="color:var(--orange);font-weight:600;">
          contact@worknowplaynow.com
        </a>
      </div>

    </div>
  </main>

  <footer>
    <div class="footer-links">
      <a href="/privacy">Privacy Policy</a>
      <a href="/terms">Terms of Service</a>
      <a href="/contact">Contact</a>
    </div>
    <div>&copy; 2026 Work Now, Play Now. All rights reserved.</div>
  </footer>

  <script>
    function sendMessage() {
      const name    = document.getElementById('contact-name').value.trim();
      const email   = document.getElementById('contact-email').value.trim();
      const message = document.getElementById('contact-message').value.trim();
      const status  = document.getElementById('contact-status');

      if (!name || !email || !message) {
        status.textContent = 'Please fill in all fields.';
        status.style.color = '#e05555';
        status.style.display = 'block';
        return;
      }

      // Opens default mail client with pre-filled message
      const subject = encodeURIComponent(`Message from ${name} via worknowplaynow.com`);
      const body    = encodeURIComponent(`Name: ${name}\nEmail: ${email}\n\n${message}`);
      window.location.href = `mailto:contact@worknowplaynow.com?subject=${subject}&body=${body}`;
    }
  </script>

</body>
</html>
