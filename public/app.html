<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/styles/index.css" />
    <title>Work Now, Play Now - App</title>
  </head>
  <body>
    <header>
      <img class="logo" src="/image/logo_512.png" alt="logo_512" />
      <div class="logo"><span style="color: var(--primary-blue)">Work Now</span>, <span style="color: var(--primary-orange)">Play Now</span></div>
      <div class="flex-spacer"></div>
      <div class="banner-buttons">
        <button id="sign-out" class="dynamic-underline" style="--underline-padding: -2px;">Sign Out</button>
      </div>
      <div id="auth-status" class="auth-status">Loading auth...</div>
    </header>

    <main>
      <section class="hero">
        <div class="hero-content">
          <h1>Your Task Dashboard</h1>
          <p>Only signed-in users can access this page.</p>
        </div>
      </section>

      <section class="features">
        <h2>Tasks</h2>
        <form id="task-form" class="task-form">
          <input id="task-name" type="text" placeholder="Task name" required />
          <select id="task-category" required>
            <option value="">Choose category</option>
          </select>
          <textarea id="task-description" placeholder="Description (optional)"></textarea>
          <button type="submit" class="cta-button">Add Task</button>
        </form>
        <div id="tasks-container" class="features-grid"></div>
      </section>
    </main>

    <footer>
      <div class="footer-links">
        <div class="links">
          <a>Privacy Policy</a>
          <a>Terms of Service</a>
        </div>
      </div>
      <div>&copy; Copyright 2026 WorkNow-PlayNow Team</div>
    </footer>

    <script type="module" src="/js/auth.js"></script>
    <script type="module" src="/js/app.js"></script>
  </body>
</html>
